server:
  port: 9090

spring:
  application:
    name: agent-orchestrator-admin

  datasource:
    url: jdbc:postgresql://localhost:5432/agent_orchestrator
    username: ao_user
    password: ao_pass_2026
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Python Agent Core 地址
agent-core:
  base-url: http://localhost:8000
  connect-timeout: 5s
  read-timeout: 60s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
