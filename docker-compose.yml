version: "3.9"

services:
  # ==================== Python Agent Core ====================
  agent-core:
    build:
      context: ./agent-core
      dockerfile: Dockerfile
    container_name: ao-agent-core
    ports:
      - "${AGENT_PORT:-8000}:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}

  # ==================== Streamlit Dashboard ====================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: ao-dashboard
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    environment:
      AGENT_API_URL: http://agent-core:8000
    depends_on:
      - agent-core
    restart: unless-stopped
